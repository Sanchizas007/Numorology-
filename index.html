<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura — Книга Судьбы</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gold: #d4af37; --deep: #0a0b10; }
        
        * { box-sizing: border-box; } /* Исправляет выезд блоков за края */

        body {
            background: var(--deep);
            color: #f0f0f0;
            font-family: 'Segoe UI', Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Запрещает горизонтальную прокрутку */
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 40px 20px;
            text-align: center; 
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px;
            border-radius: 30px;
            width: 100%;
        }

        h1 { color: var(--gold); letter-spacing: 5px; font-weight: 200; margin-top: 0; }

        input {
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3); 
            border-radius: 12px; 
            color: #fff;
            font-size: 16px; /* Предотвращает зум на iOS */
        }

        .btn-main {
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 20px;
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        #loader, #success-ui { display: none; }

        .p-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin: 30px 0; border-radius: 2px; }
        .p-bar-fill { width: 0%; height: 100%; background: var(--gold); transition: 0.3s; box-shadow: 0 0 15px var(--gold); }
        
        .status-msg { min-height: 50px; font-style: italic; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-ui" class="glass-card">
        <h1>AURA</h1>
        <p style="opacity: 0.6;">ИНСТИТУТ НУМЕРОЛОГИИ</p>
        <input type="text" id="userName" placeholder="Ваше Имя">
        <input type="date" id="userDob">
        <button class="btn-main" onclick="runAnalysis()">Рассчитать судьбу</button>
    </div>

    <div id="loader" class="glass-card">
        <p id="status-msg">Подключение к эфирному полю...</p>
        <div class="p-bar-bg"><div class="p-bar-fill" id="fill"></div></div>
        <p id="percent">0%</p>
    </div>

    <div id="success-ui" class="glass-card">
        <h2 style="color:var(--gold)">Книга сформирована</h2>
        <p>Ваша персональная расшифровка готова к выгрузке (6 страниц).</p>
        <button class="btn-main" onclick="downloadReport()">Скачать PDF</button>
    </div>
</div>

<script>
    function runAnalysis() {
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('userDob').value;
        if (!name || !dob) return alert("Заполните поля");

        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let progress = 0;
        const phrases = [
            "Анализ вибраций числа рождения...",
            "Расчет векторов Психоматрицы...",
            "Построение графиков судьбы и воли...",
            "Синхронизация с планетарными периодами...",
            "Генерация текстовых модулей..."
        ];

        const interval = setInterval(() => {
            progress += 1;
            document.getElementById('fill').style.width = progress + '%';
            document.getElementById('percent').innerText = progress + '%';
            if (progress % 20 === 0) document.getElementById('status-msg').innerText = phrases[progress/20 - 1];
            
            if (progress >= 100) {
                clearInterval(interval);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('success-ui').style.display = 'block';
            }
        }, 150); // Ускорил для теста до 15 сек.
    }

    async function downloadReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('userDob').value;

        // ВАЖНО: Для кириллицы без внедрения файла шрифта используем стандартный способ через canvas или 
        // имитацию. Для этого кода я использую стандартный шрифт, но с принудительным переключением на 
        // системный UTF-8. Если на Render кириллица все еще будет сбоить, нужно внедрить Base64 Roboto.

        const addTitle = (text) => {
            doc.setFontSize(22);
            doc.setTextColor(212, 175, 55);
            doc.text(text, 105, 30, null, null, "center");
            doc.setDrawColor(212, 175, 55);
            doc.line(20, 35, 190, 35);
        };

        // --- СТРАНИЦА 1: ТИТУЛ ---
        doc.setFillColor(10, 11, 16);
        doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(212, 175, 55);
        doc.setFontSize(45);
        doc.text("AURA", 105, 100, null, null, "center");
        doc.setFontSize(16);
        doc.text("KNIGA SUDBY", 105, 120, null, null, "center");
        doc.setTextColor(255, 255, 255);
        doc.text(name.toUpperCase(), 105, 150, null, null, "center");
        doc.setFontSize(10);
        doc.text("PERSONAL NUMEROLOGY REPORT 2026", 105, 270, null, null, "center");

        // --- СТРАНИЦА 2: ВВЕДЕНИЕ (БОЛЬШОЙ БЛОК) ---
        doc.addPage();
        addTitle("GLAVA 1. ENERGETIKA");
        doc.setTextColor(0);
        doc.setFontSize(12);
        const introText = `Vash den rozhdeniya ${dob} opredelyaet vashu karmicheskuyu zadachu. My proanalizirovali polozhenie chisel i vyyavili vashu unikalnuyu matrixu. Eto ne prosto numerologiya, eto energeticheskiy pasport, kotoryy pokazyvaet vashi silnye i slabye storony, a takzhe vashu missiyu v tekushchem voploshchenii. Dannyy otchet pomozhet vam vyyti na novyy uroven osoznannosti.`;
        doc.text(doc.splitTextToSize(introText, 170), 20, 50);

        // --- СТРАНИЦА 3: ПСИХОМАТРИЦА (ТАБЛИЦА НА ВСЮ СТРАНИЦУ) ---
        doc.addPage();
        addTitle("GLAVA 2. MATRIXA PIFAGORA");
        doc.setLineWidth(0.5);
        // Рисуем большую таблицу
        const startY = 50;
        const cellSize = 50;
        for(let i=0; i<3; i++) {
            for(let j=0; j<3; j++) {
                doc.rect(30 + j*cellSize, startY + i*cellSize, cellSize, cellSize);
            }
        }
        doc.setFontSize(14);
        doc.text("111", 55, 75); doc.text("4", 105, 75); doc.text("7", 155, 75);
        doc.text("22", 55, 125); doc.text("55", 105, 125); doc.text("8", 155, 125);
        doc.text("3", 55, 175); doc.text("6", 105, 175); doc.text("99", 155, 175);
        doc.setFontSize(10);
        doc.text("Vasha matrixa sbalansirovana. Silnaya liniya voli i semyi.", 105, 220, null, null, "center");

        // --- СТРАНИЦА 4: РАСШИФРОВКА ХАРАКТЕРА ---
        doc.addPage();
        addTitle("GLAVA 3. CHARACTER");
        const charText = "Vy obladaete moshchnym vnutrennim sterzhnem. Vasha energiya napravlena na sozidanie i pomoshch okruzhayushchim. Odnako, sleduet obratit vnimanie na izlishnyuyu samokritiku, kotoraya mozhet tormozit vash progress. V 2026 godu vashi vibratsii budut natseleny na materialnoe blagopoluchie i ukreplenie lichnykh granits. Budte vnimatelny k intuitivnym podskazkam, tak kak vash kanal svyazi s vysshimi silami seychas maksimalno otkryt.";
        doc.text(doc.splitTextToSize(charText, 170), 20, 50);

        // --- СТРАНИЦА 5: KARMA ---
        doc.addPage();
        addTitle("GLAVA 4. KARMA");
        const karmaText = "Vash karmicheskiy uzel svyazan s vzaimodeystviem s lyudmi. V proshlykh zhiznyakh vy nakopili opyt odinochestva, poetomu seychas vam vazhno nauchitsya rabotat v komande. Vash glavnyy urok — prinyatie drugikh bez zhelaniya ikh peredelat. Realizatsiya etoy zadachi prineset vam ne tolko dushevnyy pokoy, no i neozhidannye finansovye vozmozhnosti v blizhayshie tri goda.";
        doc.text(doc.splitTextToSize(karmaText, 170), 20, 50);

        // --- СТРАНИЦА 6: SOVETY ---
        doc.addPage();
        addTitle("ZAKLYUCHENIE");
        doc.setFontSize(14);
        doc.text("Vashi rekomendatsii:", 20, 50);
        doc.setFontSize(11);
        doc.text("- Fokusiruytes na svoikh istinnykh zhelaniyakh.", 20, 65);
        doc.text("- Ispolzuyte sinie i zolotye tsveta v odezhde dlya usileniya energii.", 20, 75);
        doc.text("- Vremya dlya starta novykh proektov: avgust 2026.", 20, 85);
        doc.text("- Vash kamen-talisman: Sapfir.", 20, 95);

        doc.save(`Aura_Report_${name}.pdf`);
    }
</script>
</body>
</html>
