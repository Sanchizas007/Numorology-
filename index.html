<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Книга Судьбы</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --gold: #d4af37; --deep: #0a0b10; }
        body {
            background: var(--deep);
            background-image: radial-gradient(circle at center, #1a1b2e 0%, #0a0b10 100%);
            color: #f0f0f0; font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 90%; max-width: 450px; text-align: center; padding: 60px 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2); padding: 40px; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 { color: var(--gold); letter-spacing: 8px; font-weight: 200; text-transform: uppercase; }
        input {
            width: 100%; padding: 15px; margin: 15px 0; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: #fff;
            text-align: center; font-size: 1rem; box-sizing: border-box;
        }
        .btn-main {
            background: var(--gold); color: #000; border: none; padding: 18px;
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer;
            letter-spacing: 2px; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); }
        #loader, #success-ui { display: none; }
        .p-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin: 30px 0; }
        .p-bar-fill { width: 0%; height: 100%; background: var(--gold); transition: 0.5s; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="start-ui" class="glass-card">
        <h1>AURA</h1>
        <p style="opacity: 0.6; font-size: 0.8rem; letter-spacing: 2px;">ИНСТИТУТ НУМЕРОЛОГИИ</p>
        <div style="height: 1px; background: var(--gold); width: 40px; margin: 20px auto; opacity: 0.5;"></div>
        <input type="text" id="userName" placeholder="Ваше Имя" required>
        <input type="date" id="userDob" required>
        <button class="btn-main" id="calcBtn" onclick="startAnalysis()">РАССЧИТАТЬ СУДЬБУ</button>
    </div>

    <div id="loader" class="glass-card">
        <p id="status-msg" style="color: var(--gold); font-style: italic;">Инициализация эфирного потока...</p>
        <div class="p-bar-bg"><div class="p-bar-fill" id="fill"></div></div>
        <p id="percent">0%</p>
    </div>

    <div id="success-ui" class="glass-card">
        <h2 style="color:var(--gold)">КНИГА ГОТОВА</h2>
        <p>Ваша матрица успешно расшифрована. Сгенерирован подробный отчет на 6 страницах.</p>
        <div style="font-size: 1.8rem; margin: 20px 0; color: var(--gold);">DEMO ACCESS</div>
        <button class="btn-main" onclick="generateDetailedPDF()">СКАЧАТЬ ОТЧЕТ (.PDF)</button>
    </div>
</div>

<script>
    // Настройка шрифта для PDF (Roboto с поддержкой кириллицы)
    const fontUrl = "https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Regular.ttf";

    function startAnalysis() {
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('userDob').value;

        if (!name || !dob) {
            alert("Пожалуйста, заполните все поля");
            return;
        }

        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        let progress = 0;
        const bar = document.getElementById('fill');
        const status = document.getElementById('status-msg');
        const perc = document.getElementById('percent');

        const phrases = [
            "Считывание числовых вибраций...",
            "Построение Квадрата Пифагора...",
            "Анализ кармических воплощений...",
            "Расчет транзитов планет на 2026 год...",
            "Финальная визуализация Матрицы..."
        ];

        const interval = setInterval(() => {
            progress++;
            bar.style.width = progress + '%';
            perc.innerText = progress + '%';

            if (progress % 20 === 0) {
                status.innerText = phrases[Math.floor(progress / 20) - 1];
            }

            if (progress >= 100) {
                clearInterval(interval);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('success-ui').style.display = 'block';
            }
        }, 300); // Для теста поставил 30 секунд (300ms * 100). Для 1 минуты поставь 600.
    }

    async function generateDetailedPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Подключаем шрифт Roboto для поддержки кириллицы
        // ВАЖНО: jsPDF требует шрифты в формате base64. 
        // Чтобы код работал прямо сейчас, мы используем встроенные возможности,
        // но текст будет выводиться через стандартную кодировку. 
        
        const name = document.getElementById('userName').value;
        const dob = document.getElementById('userDob').value;

        const writePageTitle = (title) => {
            doc.setFontSize(22);
            doc.setTextColor(212, 175, 55);
            doc.text(title, 105, 30, null, null, "center");
            doc.setDrawColor(212, 175, 55);
            doc.line(20, 35, 190, 35);
        };

        // СТРАНИЦА 1: ТИТУЛ
        doc.setFillColor(10, 11, 16);
        doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(212, 175, 55);
        doc.setFontSize(40);
        doc.text("AURA", 105, 100, null, null, "center");
        doc.setFontSize(16);
        doc.text("КНИГА СУДЬБЫ", 105, 115, null, null, "center");
        doc.setTextColor(255, 255, 255);
        doc.text(name.toUpperCase(), 105, 140, null, null, "center");
        doc.setFontSize(10);
        doc.text("ИНДИВИДУАЛЬНЫЙ НУМЕРОЛОГИЧЕСКИЙ РАСЧЕТ", 105, 260, null, null, "center");

        // СТРАНИЦА 2: ВВЕДЕНИЕ
        doc.addPage();
        writePageTitle("ВВЕДЕНИЕ");
        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        const text1 = `Дата вашего рождения — ${dob} — является ключом к пониманию вашей миссии. В нумерологии каждое число несет вибрацию, которая формирует ваш характер и событийный ряд. Этот отчет разберет ваши врожденные настройки.`;
        doc.text(doc.splitTextToSize(text1, 170), 20, 50);

        // СТРАНИЦА 3: ЧИСЛО ЖИЗНЕННОГО ПУТИ
        doc.addPage();
        writePageTitle("ГЛАВА 1. ПУТЬ");
        doc.setTextColor(0);
        const text2 = "Число Жизненного Пути определяет вашу главную стратегию успеха. Оно показывает, какие уроки вам предстоит пройти и в чем заключается ваш истинный талант. Вы находитесь в периоде активного роста духовных сил.";
        doc.text(doc.splitTextToSize(text2, 170), 20, 50);

        // СТРАНИЦА 4: КВАДРАТ ПИФАГОРА
        doc.addPage();
        writePageTitle("ГЛАВА 2. МАТРИЦА");
        // Отрисовка квадрата
        doc.rect(40, 60, 40, 40); doc.rect(80, 60, 40, 40); doc.rect(120, 60, 40, 40);
        doc.rect(40, 100, 40, 40); doc.rect(80, 100, 40, 40); doc.rect(120, 100, 40, 40);
        doc.rect(40, 140, 40, 40); doc.rect(80, 140, 40, 40); doc.rect(120, 140, 40, 40);
        doc.text("Воля", 50, 85); doc.text("Здоровье", 85, 85); doc.text("Удача", 130, 85);
        doc.text("Энергия", 45, 125); doc.text("Логика", 90, 125); doc.text("Долг", 135, 125);
        doc.text("Память", 50, 165); doc.text("Труд", 90, 165); doc.text("Интуиция", 125, 165);

        // СТРАНИЦА 5: КАРМА
        doc.addPage();
        writePageTitle("ГЛАВА 3. КАРМА");
        const text3 = "Ваш кармический долг связан с проработкой уверенности в себе. Прошлые воплощения дали вам мощную интуицию, но в этой жизни вам необходимо научиться опираться на материальные факты и логику.";
        doc.text(doc.splitTextToSize(text3, 170), 20, 50);

        // СТРАНИЦА 6: СОВЕТЫ
        doc.addPage();
        writePageTitle("ЗАКЛЮЧЕНИЕ");
        const text4 = "Ваш 2026 год станет временем великих открытий. Рекомендуется фокусироваться на творчестве и новых партнерствах. Цвет вашей удачи — глубокий синий. Камень-оберег — сапфир.\n\nПомните: числа указывают путь, но идете по нему вы сами.";
        doc.text(doc.splitTextToSize(text4, 170), 20, 50);
        
        doc.save(`Aura_Report_${name}.pdf`);
    }
</script>

</body>
</html>
