<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Книга Судьбы</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --deep: #0a0b10;
            --violet: #1a0b2e;
        }

        body {
            background: linear-gradient(rgba(10, 11, 16, 0.9), rgba(10, 11, 16, 0.9)), 
                        url('https://images.unsplash.com/photo-1502134249126-9f3755a50d78?q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            color: #f0f0f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 500px; text-align: center; padding: 60px 20px; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: var(--gold); letter-spacing: 8px; font-weight: 200; margin-bottom: 5px; }
        .sep { width: 50px; height: 1px; background: var(--gold); margin: 20px auto; }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }

        .btn-main {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main:hover { filter: brightness(1.2); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }

        /* Прогресс-бар */
        #loader { display: none; }
        .p-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin: 30px 0; position: relative; }
        .p-bar-fill { width: 0%; height: 100%; background: var(--gold); box-shadow: 0 0 15px var(--gold); transition: 0.5s; }
        .status-msg { font-style: italic; font-size: 0.9rem; color: var(--gold); min-height: 40px; }

        #success-ui { display: none; }
        footer { margin-top: auto; padding: 30px; font-size: 0.8rem; opacity: 0.4; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-ui" class="glass-card">
        <h1>AURA</h1>
        <p>ИНСТИТУТ НУМЕРОЛОГИИ</p>
        <div class="sep"></div>
        <input type="text" id="name" placeholder="Ваше Имя">
        <input type="date" id="dob">
        <button class="btn-main" onclick="process()">РАССЧИТАТЬ СУДЬБУ</button>
    </div>

    <div id="loader" class="glass-card">
        <p id="status-msg">Инициализация потока данных...</p>
        <div class="p-bar-bg"><div class="p-bar-fill" id="fill"></div></div>
        <p id="percent">0%</p>
    </div>

    <div id="success-ui" class="glass-card">
        <h2 style="color:var(--gold)">АНАЛИЗ ЗАВЕРШЕН</h2>
        <p>Ваша книга судеб сформирована на основе вибраций планет и чисел Пифагора.</p>
        <div style="font-size: 1.5rem; margin: 20px 0;">990 ₽</div>
        <button class="btn-main" onclick="generatePDF()">СКАЧАТЬ КНИГУ (ДЕМО)</button>
    </div>

    <footer>
        © 2026 Aura Astrology. Все права защищены законом Космоса.
    </footer>
</div>

<script>
    const db = {
        lifePath: {
            1: "Путь Лидера. Вы — первооткрыватель. Энергия Солнца дает вам силу создавать миры из хаоса.",
            2: "Путь Дипломата. Ваша сила в партнерстве и интуитивном чувствовании других людей.",
            3: "Путь Творца. Самовыражение и оптимизм — ваши главные инструменты в этом воплощении.",
            4: "Путь Мастера. Вы — фундамент этого мира. Терпение и структура ведут вас к успеху.",
            5: "Путь Свободы. Жизнь — это приключение. Ваша задача — учить других гибкости.",
            6: "Путь Наставника. Гармония, семья и служение красоте — ваша истинная природа.",
            7: "Путь Мудреца. Поиск истины и духовное уединение раскроют ваши скрытые таланты.",
            8: "Путь Власти. Вы пришли, чтобы управлять материальными потоками и балансировать карму.",
            9: "Путь Гуманиста. Завершение цикла. Ваша любовь к миру не знает границ.",
            11: "Мастер-Число. Пророк. Вы слышите шепот вселенной яснее других.",
            22: "Мастер-Строитель. Способность воплощать самые безумные духовные идеи в материю."
        },
        zodiac: [
            { name: "Козерог", element: "Земля" }, { name: "Водолей", element: "Воздух" },
            { name: "Рыбы", element: "Вода" }, { name: "Овен", element: "Огонь" },
            { name: "Телец", element: "Земля" }, { name: "Близнецы", element: "Воздух" },
            { name: "Рак", element: "Вода" }, { name: "Лев", element: "Огонь" },
            { name: "Дева", element: "Земля" }, { name: "Весы", element: "Воздух" },
            { name: "Скорпион", element: "Вода" }, { name: "Стрелец", element: "Огонь" }
        ]
    };

    const phrases = [
        "Считывание астрального кода...",
        "Построение натальной карты...",
        "Анализ положения Сатурна...",
        "Расчет Психоматрицы Пифагора...",
        "Поиск кармических узлов...",
        "Генерация персональных советов...",
        "Финальная калибровка PDF-отчета..."
    ];

    function getZodiac(date) {
        const day = date.getDate();
        const month = date.getMonth();
        const signs = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
        const idx = (day < signs[month]) ? month : (month + 1) % 12;
        return db.zodiac[idx];
    }

    function process() {
        if(!document.getElementById('name').value || !document.getElementById('dob').value) return;
        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        let p = 0;
        const interval = setInterval(() => {
            p++;
            document.getElementById('fill').style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
            if(p % 15 === 0) document.getElementById('status-msg').innerText = phrases[Math.floor(p/15)];
            if(p >= 100) {
                clearInterval(interval);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('success-ui').style.display = 'block';
            }
        }, 600); // 60 секунд
    }

    function calculateNumerology(dob) {
        let nums = dob.replace(/-/g, '').split('').map(Number);
        let sum = nums.reduce((a, b) => a + b, 0);
        while (sum > 9 && sum !== 11 && sum !== 22) {
            sum = sum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
        }
        return sum;
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('name').value;
        const dobStr = document.getElementById('dob').value;
        const dobDate = new Date(dobStr);
        
        const num = calculateNumerology(dobStr);
        const zodiac = getZodiac(dobDate);

        // Чтобы не было иероглифов, мы не используем doc.text напрямую для кириллицы
        // В идеале сюда нужно вставить base64 шрифта, но для демо мы сделаем "чит":
        // Используем встроенный в jsPDF метод работы с текстом через стандартный шрифт, 
        // но в реальном продакшене тебе нужно будет добавить doc.addFont('Roboto.ttf').
        
        // Оформление
        doc.setFillColor(15, 15, 20);
        doc.rect(0, 0, 210, 297, 'F');
        
        doc.setTextColor(212, 175, 55);
        doc.setFontSize(22);
        doc.text("AURA: THE BOOK OF DESTINY", 105, 40, null, null, "center");
        
        doc.setDrawColor(212, 175, 55);
        doc.line(40, 45, 170, 45);

        doc.setFontSize(14);
        doc.setTextColor(255, 255, 255);
        doc.text(`Master: ${name}`, 20, 70);
        doc.text(`Birth Date: ${dobStr}`, 20, 80);
        
        doc.setTextColor(212, 175, 55);
        doc.text("--- COSMIC ANALYTICS ---", 105, 100, null, null, "center");

        doc.setTextColor(200, 200, 200);
        doc.setFontSize(12);
        
        // Данные (на английском для избежания багов в демо, 
        // или нужно подключать кастомный шрифт)
        doc.text(`Life Path Number: ${num}`, 20, 120);
        doc.text(`Zodiac Sign: ${zodiac.name} (${zodiac.element})`, 20, 130);
        
        const desc = db.lifePath[num] || "Analyzing...";
        // Используем splitTextToSize для переноса строк
        const splitText = doc.splitTextToSize(`Destiny Message: ${desc}`, 170);
        doc.text(splitText, 20, 150);

        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text("Generated by Aura AI Engine. May 2026.", 105, 280, null, null, "center");

        doc.save(`Aura_Book_${name}.pdf`);
    }
</script>
</body>
</html>
