<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura — Книга Судьбы</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --deep: #0a0b10;
            --mystic: #1a0b2e;
        }

        body {
            background: linear-gradient(rgba(10, 11, 16, 0.9), rgba(10, 11, 16, 0.9)), 
                        url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=2013');
            background-size: cover;
            color: #f0f0f0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 90%; max-width: 500px; text-align: center; padding: 60px 20px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: var(--gold); letter-spacing: 8px; font-weight: 200; margin-bottom: 5px; }
        input {
            width: 100%; padding: 15px; margin: 15px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px; color: #fff; text-align: center;
        }

        .btn-main {
            background: var(--gold); color: #000; border: none; padding: 18px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
            letter-spacing: 2px; margin-top: 10px;
        }

        #loader { display: none; }
        .p-bar-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin: 30px 0; }
        .p-bar-fill { width: 0%; height: 100%; background: var(--gold); transition: 0.5s; }
        #success-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-ui" class="glass-card">
        <h1>AURA</h1>
        <p>ИНСТИТУТ НУМЕРОЛОГИИ</p>
        <input type="text" id="name" placeholder="Ваше Имя">
        <input type="date" id="dob">
        <button class="btn-main" onclick="process()">РАССЧИТАТЬ СУДЬБУ</button>
    </div>

    <div id="loader" class="glass-card">
        <p id="status-msg">Инициализация потока...</p>
        <div class="p-bar-bg"><div class="p-bar-fill" id="fill"></div></div>
        <p id="percent">0%</p>
    </div>

    <div id="success-ui" class="glass-card">
        <h2 style="color:var(--gold)">АНАЛИЗ ЗАВЕРШЕН</h2>
        <p>Ваша книга судеб сформирована. Объем отчета: 6 страниц глубокой аналитики.</p>
        <button class="btn-main" onclick="generatePDF()">СКАЧАТЬ КНИГУ (ДЕМО)</button>
    </div>
</div>

<script>
    // База текстов (упрощенно для примера, но структурировано)
    const interpretations = {
        lifePath: {
            1: "Вы — Число Лидера. Ваша жизнь — это путь воина и первопроходца. Солнце наделяет вас энергией власти и созидания. Ваша задача — вести людей за собой, не подавляя их свободу.",
            2: "Вы — Число Дипломата. Ваша сила в мягкости и интуиции. Луна дает вам способность видеть скрытые мотивы. Вы рождены, чтобы нести мир и гармонию в партнерстве.",
            3: "Вы — Число Творца. Самовыражение и радость — ваши главные векторы. Юпитер расширяет ваши возможности, превращая любое дело в искусство.",
            4: "Вы — Число Мастера. Вы строитель этого мира. Сатурн дает вам дисциплину и структуру. Ваша жизнь — это создание прочного фундамента для себя и близких.",
            5: "Вы — Число Свободы. Меркурий делает вас вечным странником. Ваша задача — познавать мир через изменения, путешествия и новые контакты.",
            6: "Вы — Число Служения. Венера наделяет вас чувством красоты и долга. Ваш путь — это забота о семье, исцеление и создание уюта.",
            7: "Вы — Число Мудреца. Кету направляет ваш взор внутрь себя. Вы здесь, чтобы познать тайны бытия через одиночество и глубокий анализ.",
            8: "Вы — Число Власти. Раху дает вам амбиции. Вы управляете материальными потоками, балансируя на грани духовного и земного успеха.",
            9: "Вы — Число Гуманиста. Марс дает энергию для завершения циклов. Вы — старая душа, пришедшая отдать любовь миру и очистить карму."
        }
    };

    function process() {
        if(!document.getElementById('name').value || !document.getElementById('dob').value) return;
        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        let p = 0;
        const phrases = ["Связь с Хрониками Акаши...", "Анализ Психоматрицы...", "Синхронизация планет...", "Шифрование данных..."];
        const interval = setInterval(() => {
            p++;
            document.getElementById('fill').style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
            if(p % 25 === 0) document.getElementById('status-msg').innerText = phrases[Math.floor(p/25)];
            if(p >= 100) {
                clearInterval(interval);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('success-ui').style.display = 'block';
            }
        }, 600); 
    }

    // Расчет Числа Жизненного Пути
    function getLifePath(dob) {
        let sum = dob.replace(/-/g, '').split('').map(Number).reduce((a, b) => a + b, 0);
        while (sum > 9 && sum !== 11 && sum !== 22) {
            sum = sum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
        }
        return sum;
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('name').value;
        const dob = document.getElementById('dob').value;
        const lp = getLifePath(dob);

        // ВАЖНО: Добавляем поддержку русского языка
        // В продакшене нужно добавить .ttf шрифт через doc.addFont()
        // Для этого демо используем системный шрифт, который часто поддерживает UTF-8 в современных браузерах
        doc.setFont("times", "bold");

        // --- СТРАНИЦА 1: ТИТУЛЬНЫЙ ЛИСТ ---
        doc.setFillColor(15, 15, 20); doc.rect(0, 0, 210, 297, 'F');
        doc.setTextColor(212, 175, 55); doc.setFontSize(30);
        doc.text("КНИГА СУДЬБЫ", 105, 100, null, null, "center");
        doc.setFontSize(16); doc.text(name.toUpperCase(), 105, 120, null, null, "center");
        doc.line(60, 125, 150, 125);
        doc.setFontSize(12); doc.text("ПЕРСОНАЛЬНЫЙ НУМЕРОЛОГИЧЕСКИЙ ОТЧЕТ", 105, 140, null, null, "center");

        // --- СТРАНИЦА 2: ВВЕДЕНИЕ ---
        doc.addPage();
        doc.setTextColor(0,0,0); doc.setFontSize(18); doc.text("Глава 1. Код Вашего Воплощения", 20, 30);
        doc.setFontSize(12);
        let intro = `Уважаемый(ая) ${name}, в момент Вашего рождения звезды и числа выстроились в уникальный узор. Этот отчет — путеводитель по Вашей внутренней вселенной. Мы проанализировали Вашу дату рождения ${dob} и готовы раскрыть тайны, которые были скрыты до этого момента.`;
        doc.text(doc.splitTextToSize(intro, 170), 20, 50);
        doc.text("Числа — это не просто знаки, это вибрации, определяющие Ваш характер и судьбу.", 20, 80);

        // --- СТРАНИЦА 3: ЧИСЛО ЖИЗНЕННОГО ПУТИ ---
        doc.addPage();
        doc.setFontSize(18); doc.text("Глава 2. Число Жизненного Пути: " + lp, 20, 30);
        doc.setFontSize(12);
        let lpText = interpretations.lifePath[lp] || "Ваш путь уникален и требует индивидуальной настройки.";
        doc.text(doc.splitTextToSize(lpText, 170), 20, 50);
        doc.text("Это число определяет Вашу главную задачу на Земле. Игнорирование этого кода ведет к ощущению 'бега на месте'.", 20, 100);

        // --- СТРАНИЦА 4: ПСИХОМАТРИЦА (ПИФАГОР) ---
        doc.addPage();
        doc.setFontSize(18); doc.text("Глава 3. Психоматрица Пифагора", 20, 30);
        doc.setFontSize(12);
        doc.text("Ваша матрица — это энергетический паспорт. Мы рассчитали баланс воли, энергии и талантов.", 20, 45);
        // Рисуем сетку
        doc.rect(50, 60, 30, 30); doc.rect(80, 60, 30, 30); doc.rect(110, 60, 30, 30);
        doc.rect(50, 90, 30, 30); doc.rect(80, 90, 30, 30); doc.rect(110, 90, 30, 30);
        doc.rect(50, 120, 30, 30); doc.rect(80, 120, 30, 30); doc.rect(110, 120, 30, 30);
        doc.text("1", 62, 80); doc.text("4", 92, 80); doc.text("7", 122, 80);
        doc.text("Ваш характер: Гармоничный, стремящийся к саморазвитию.", 20, 170);

        // --- СТРАНИЦА 5: КАРМИЧЕСКИЕ ЗАДАЧИ ---
        doc.addPage();
        doc.setFontSize(18); doc.text("Глава 4. Кармический Узел", 20, 30);
        let karma = "Согласно Вашей дате, в прошлом воплощении Вы накопили опыт в управлении, но не реализовали творческий потенциал. В этой жизни Вселенная будет подбрасывать Вам ситуации, где нужно проявлять гибкость и креативность. Избегайте застоя и страха перед неизвестностью.";
        doc.text(doc.splitTextToSize(karma, 170), 20, 50);

        // --- СТРАНИЦА 6: ЗАКЛЮЧЕНИЕ ---
        doc.addPage();
        doc.setFontSize(18); doc.text("Заключение и Советы", 20, 30);
        doc.setFontSize(12);
        let advice = "1. Помните о балансе между духовным и материальным.\n2. Ваше слабое место в 2026 году — излишняя самокритика.\n3. Благоприятные цвета: Индиго и Золото.\n4. Ваша планета-покровитель на этот год — Сатурн, требующий дисциплины.";
        doc.text(advice, 20, 50);
        doc.text("Ваша судьба в Ваших руках. Данный отчет — лишь карта, но дорогу выбираете Вы.", 20, 120);
        doc.setTextColor(212, 175, 55);
        doc.text("С уважением, Ваш ИИ-проводник Aura.", 105, 250, null, null, "center");

        doc.save(`Aura_Fate_Book_${name}.pdf`);
    }
</script>
</body>
</html>
